name: Import Instructor Ratings (CSV → Airtable)

on:
  workflow_dispatch:
    inputs:
      form_record_id:
        description: "Airtable record ID in tblu4fK3CDzDhBjK1 (form submissions table)"
        required: true
        type: string

  repository_dispatch:
    types: [airtable_form_created]

jobs:
  run-import:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve form record id
        id: rid
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FORM_RECORD_ID=${{ inputs.form_record_id }}" >> $GITHUB_ENV
          else
            echo "FORM_RECORD_ID=${{ github.event.client_payload.form_record_id }}" >> $GITHUB_ENV
          fi

      - name: Run import
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}

          AIRTABLE_BASE_ID: ${{ secrets.RATINGS_AIRTABLE_BASE_ID }}
          FORM_TABLE_ID: ${{ secrets.RATINGS_FORM_TABLE_ID }}
          FEEDBACKS_TABLE_ID: ${{ secrets.RATINGS_FEEDBACKS_TABLE_ID }}
          LOGS_TABLE_ID: ${{ secrets.RATINGS_LOGS_TABLE_ID }}
          FORM_RECORD_ID: ${{ env.FORM_RECORD_ID }}

        run: node scripts/import-instructor-ratings.js
