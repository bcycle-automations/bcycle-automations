name: Generate Measurements PDF

on:
  workflow_dispatch:
    inputs:
      record_id:
        description: "Airtable Class record ID"
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest

    # Job-level env so every step (including the node run) has access
    env:
      AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
