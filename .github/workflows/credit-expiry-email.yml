name: Credit Expiry Email

on:
  workflow_dispatch:
    inputs:
      test_email:
        description: "TEST ONLY: enter the email address that should receive one test email"
        required: true
        type: string

      target_expiration_date:
        description: "TEST ONLY: expiration date to retrieve, formatted YYYY-MM-DD"
        required: true
        default: "2026-08-20"
        type: string

  schedule:
    # 6:00 UTC = 1:00 a.m. EST
    - cron: "0 6 * * *"

jobs:
  credit-expiry-email:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run credit expiry automation
        env:
          MTEK_API_TOKEN: ${{ secrets.MTEK_API_TOKEN }}

          M365_CLIENT_ID: ${{ secrets.M365_CLIENT_ID }}
          M365_CLIENT_SECRET: ${{ secrets.M365_CLIENT_SECRET }}
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          M365_SENDER_UPN: ${{ secrets.M365_SENDER_UPN }}

          TEST_EMAIL: ${{ github.event.inputs.test_email }}
          TARGET_EXPIRATION_DATE: ${{ github.event.inputs.target_expiration_date }}

        run: node scripts/credit-expiry-email.mjs
