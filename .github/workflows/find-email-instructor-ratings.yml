name: Find Email Instructor Rating (View-only)

on:
  workflow_dispatch: {}

jobs:
  run-find-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run find-email job
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          MTEK_API_TOKEN: ${{ secrets.MTEK_API_TOKEN }}
          MTEK_BASE_URL: ${{ secrets.MTEK_BASE_URL }}

          AIRTABLE_BASE_ID: app3XN0v7vjPALgAV
          FEEDBACKS_TABLE_ID: tbl2ZcYV8LCcihQvP
          LOGS_TABLE_ID: tbljXmfkQ0eitjsqr

        run: node scripts/find-email-instructor-ratings.js
