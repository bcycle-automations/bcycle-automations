name: Find Email Instructor Rating (View → Airtable Email Field)

on:
  workflow_dispatch: {}

  repository_dispatch:
    types: [find_email_instructor_rating]

jobs:
  run-find-email:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run find-email script
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}

          # Optional but required if using MTEK lookup
          MTEK_API_TOKEN: ${{ secrets.MTEK_API_TOKEN }}
          MTEK_BASE_URL: ${{ secrets.MTEK_BASE_URL }}

          AIRTABLE_BASE_ID: app3XN0v7vjPALgAV
          FEEDBACKS_TABLE_ID: tbl2ZcYV8LCcihQvP
          LOGS_TABLE_ID: tbljXmfkQ0eitjsqr

        run: node scripts/find-email-instructor-ratings.js
